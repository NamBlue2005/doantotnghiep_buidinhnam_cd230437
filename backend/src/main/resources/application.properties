# Tên ứng dụng
spring.application.name=backend

# Đổi port server để tránh xung đột với Nginx (mặc định là 8080)
server.port=8081

# Cấu hình kết nối MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/vechai_db?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Namblue2005@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình Hibernate / JPA
# ddl-auto=update giúp Spring Boot tự động tạo/cập nhật bảng trong MySQL dựa trên Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

